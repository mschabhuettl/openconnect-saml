name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  install-test:
    name: Install & CLI Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libegl1 libgl1
          fi

      - name: Install from source
        run: pip install .

      - name: CLI smoke test
        run: |
          openconnect-saml --help
          openconnect-saml --version || true

      - name: Module import test
        run: |
          python -c "
          from openconnect_saml import __version__, __description__
          print(f'Version: {__version__}')
          print(f'Description: {__description__}')
          
          from openconnect_saml.config import Config, load, save, DisplayMode
          print('Config module OK')
          
          from openconnect_saml.profile import get_profiles
          print('Profile module OK')
          
          from openconnect_saml.authenticator import Authenticator
          print('Authenticator module OK')
          
          print('All imports successful ✅')
          "

      - name: Config creation test
        run: |
          python -c "
          from openconnect_saml.config import HostProfile, Credentials, get_default_auto_fill_rules
          
          hp = HostProfile(address='vpn.example.com', user_group='test', name='Test VPN')
          print(f'Server: {hp.vpn_url}')
          
          creds = Credentials(username='testuser')
          print(f'User: {creds.username}')
          
          rules = get_default_auto_fill_rules()
          print(f'Default rules: {len(rules)} entries')
          assert len(rules) > 0, 'No default rules!'
          
          print('Config tests OK ✅')
          "

      - name: Security features test
        run: |
          python -c "
          from openconnect_saml.authenticator import Authenticator, SSLLegacyAdapter
          print('Authenticator + SSL Legacy Adapter OK ✅')
          
          from openconnect_saml.config import Credentials
          c = Credentials(username='test')
          r = repr(c)
          assert 'password' not in r.lower() or '***' in r, 'Password leaked in repr!'
          print('Credential safety OK ✅')
          "

  pip-install-test:
    name: pip install from PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1

      - name: Install from PyPI
        run: pip install openconnect-saml

      - name: Verify install
        run: |
          openconnect-saml --help
          python -c "from openconnect_saml import __version__; print(f'PyPI version: {__version__}')"
