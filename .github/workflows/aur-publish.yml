name: AUR Publish

on:
  repository_dispatch:
    types: [aur-publish]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without v prefix)"
        required: false

jobs:
  aur-publish:
    name: Update AUR package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Download source tarball and compute sha256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/mschabhuettl/openconnect-saml/archive/v${VERSION}.tar.gz"
          curl -sL "$URL" -o source.tar.gz
          SHA=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Load AUR SSH key into ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Trust AUR host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update AUR package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"

          # Clone AUR repo (ssh-agent provides the key)
          git clone aur@aur.archlinux.org:openconnect-saml.git /tmp/aur-repo
          cd /tmp/aur-repo

          # Configure git
          git config user.email "aur@mschabhuettl.dev"
          git config user.name "Matthias Schabhüttl"

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA}')/" PKGBUILD

          # Generate .SRCINFO with the matching sha256, in a single atomic
          # commit alongside the PKGBUILD update.
          {
            echo "pkgbase = openconnect-saml"
            echo "	pkgdesc = OpenConnect wrapper with Azure AD (SAML) SSO support for Cisco SSL-VPNs"
            echo "	pkgver = ${VERSION}"
            echo "	pkgrel = 1"
            echo "	url = https://github.com/mschabhuettl/openconnect-saml"
            echo "	arch = any"
            echo "	license = GPL-3.0-or-later"
            echo "	depends = python>=3.10"
            echo "	depends = openconnect"
            echo "	depends = python-attrs"
            echo "	depends = python-colorama"
            echo "	depends = python-keyring"
            echo "	depends = python-lxml"
            echo "	depends = python-prompt_toolkit"
            echo "	depends = python-pyotp"
            echo "	depends = python-pyqt6"
            echo "	depends = python-pyqt6-webengine"
            echo "	depends = python-pysocks"
            echo "	depends = python-pyxdg"
            echo "	depends = python-requests"
            echo "	depends = python-structlog"
            echo "	depends = python-toml"
            echo "	makedepends = python-build"
            echo "	makedepends = python-installer"
            echo "	makedepends = python-hatchling"
            echo "	source = openconnect-saml-${VERSION}.tar.gz::https://github.com/mschabhuettl/openconnect-saml/archive/v${VERSION}.tar.gz"
            echo "	sha256sums = ${SHA}"
            echo ""
            echo "pkgname = openconnect-saml"
          } > .SRCINFO

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "Update to ${VERSION}"
            git push origin master
          fi
