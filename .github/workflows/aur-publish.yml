name: AUR Publish

on:
  repository_dispatch:
    types: [aur-publish]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without v prefix)"
        required: false

jobs:
  aur-publish:
    name: Update AUR package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Download source tarball and compute sha256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/mschabhuettl/openconnect-saml/archive/v${VERSION}.tar.gz"
          curl -sL "$URL" -o source.tar.gz
          SHA=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Load AUR SSH key into ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Trust AUR host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update AUR package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"

          # Clone AUR repo (ssh-agent provides the key)
          git clone aur@aur.archlinux.org:openconnect-saml.git /tmp/aur-repo
          cd /tmp/aur-repo

          # Configure git
          git config user.email "aur@mschabhuettl.dev"
          git config user.name "Matthias Schabhüttl"

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA}')/" PKGBUILD

          # Commit and push (only if there are changes)
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "Update to ${VERSION}"
            git push origin master
          fi

          # Generate .SRCINFO
          echo 'pkgbase = openconnect-saml' > .SRCINFO
          echo ' pkgdesc = OpenConnect wrapper with Azure AD (SAML) SSO support for Cisco SSL-VPNs' >> .SRCINFO
          echo " pkgver = ${VERSION}" >> .SRCINFO
          echo ' pkgrel = 1' >> .SRCINFO
          echo ' url = https://github.com/mschabhuettl/openconnect-saml' >> .SRCINFO
          echo ' arch = any' >> .SRCINFO
          echo ' license = GPL-3.0-or-later' >> .SRCINFO
          echo ' depends = python>=3.10' >> .SRCINFO
          echo ' depends = openconnect' >> .SRCINFO
          echo ' depends = python-attrs' >> .SRCINFO
          echo ' depends = python-colorama' >> .SRCINFO
          echo ' depends = python-keyring' >> .SRCINFO
          echo ' depends = python-lxml' >> .SRCINFO
          echo ' depends = python-prompt_toolkit' >> .SRCINFO
          echo ' depends = python-pyotp' >> .SRCINFO
          echo ' depends = python-pyqt6' >> .SRCINFO
          echo ' depends = python-pyqt6-webengine' >> .SRCINFO
          echo ' depends = python-pysocks' >> .SRCINFO
          echo ' depends = python-pyxdg' >> .SRCINFO
          echo ' depends = python-requests' >> .SRCINFO
          echo ' depends = python-structlog' >> .SRCINFO
          echo ' depends = python-toml' >> .SRCINFO
          echo ' makedepends = python-build' >> .SRCINFO
          echo ' makedepends = python-installer' >> .SRCINFO
          echo ' makedepends = python-hatchling' >> .SRCINFO
          echo " source = openconnect-saml-${VERSION}.tar.gz::https://github.com/mschabhuettl/openconnect-saml/archive/v${VERSION}.tar.gz" >> .SRCINFO
          echo ' sha256sums = SKIP' >> .SRCINFO
          echo >> .SRCINFO
          echo 'pkgname = openconnect-saml' >> .SRCINFO
          echo " download = https://github.com/mschabhuettl/openconnect-saml/archive/v${VERSION}.tar.gz" >> .SRCINFO
          git add .SRCINFO
          git commit -m "Update .SRCINFO"
          git push origin master
