name: AUR Publish

on:
  repository_dispatch:
    types: [aur-publish]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without v prefix)"
        required: false

jobs:
  aur-publish:
    name: Update AUR package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Download source tarball and compute sha256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/mschabhuettl/openconnect-saml/archive/v${VERSION}.tar.gz"
          curl -sL "$URL" -o source.tar.gz
          SHA=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Update AUR package
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"

          # Debug: check SSH key is loaded
          echo "SSH key length: ${#AUR_SSH_KEY}"
          echo "SSH key first 50 chars: ${AUR_SSH_KEY:0:50}"

          # Set up SSH key for AUR
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          # Debug: check if key is valid
          ssh -T -i ~/.ssh/id_ed25519 aur@aur.archlinux.org 2>&1 || true

          # Clone AUR repo
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519" git clone aur@aur.archlinux.org:openconnect-saml.git /tmp/aur-repo 2>&1
          cd /tmp/aur-repo

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA}')/" PKGBUILD

          # Commit and push
          git add -A
          git commit -m "Update to ${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519" git push origin master
